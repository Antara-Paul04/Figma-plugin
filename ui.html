<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--figma-color-bg, #2c2c2c);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #toolbar {
    display: flex;
    gap: 6px;
    padding: 6px 8px 2px;
    flex-shrink: 0;
  }
  #toolbar button {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: rgba(255,255,255,0.8);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #toolbar button:hover {
    background: rgba(255,255,255,0.12);
  }
  #toolbar button:active {
    background: rgba(255,255,255,0.18);
  }
  #toolbar button canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #hint {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px;
    padding: 2px 0 4px;
    flex-shrink: 0;
  }
  #c {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    width: 100%;
    flex: 1;
    min-height: 0;
  }
  #resize-handle {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    z-index: 10;
  }
  #resize-handle::after {
    content: '';
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 8px;
    height: 8px;
    border-right: 2px solid rgba(255,255,255,0.3);
    border-bottom: 2px solid rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div id="toolbar">
  <button data-type="cat"><canvas width="16" height="14" id="ic-cat"></canvas>Cat</button>
  <button data-action="sit"><canvas width="16" height="14" id="ic-cat_sit"></canvas>Cat Sit</button>
  <button data-action="catno"><canvas width="16" height="14" id="ic-cat_no"></canvas>Cat No</button>
  <button data-type="greycat"><canvas width="16" height="14" id="ic-greycat"></canvas>Grey Cat</button>
  <button data-action="greysit"><canvas width="16" height="14" id="ic-greycat_sit"></canvas>Grey Sit</button>
</div>
<div id="hint">click to flip · drag to move · double-click to remove</div>
<canvas id="c"></canvas>
<div id="resize-handle"></div>

// ── Constants ──────────────────────────────────────────────────
const PX = 3;
const SP_W = 16, SP_H = 14;
const PET_W = SP_W * PX;
const PET_H = SP_H * PX;
const CAT_SIZE = 100;

// ── SVG frames (imported from assets/ via build.js) ──
const svgFrames = {};   // { cat: [canvas,...], cat_sit: [canvas,...], ... }
const svgReady = {};

function loadSvgFrames(type, dataURIs) {
  svgFrames[type] = [];
  svgReady[type] = false;
  let loaded = 0;
  dataURIs.forEach(uri => {
    const img = new Image();
    img.onload = () => {
      // 1) Render SVG at native resolution (no gaps)
      const native = document.createElement('canvas');
      native.width = img.naturalWidth;
      native.height = img.naturalHeight;
      native.getContext('2d').drawImage(img, 0, 0);
      // 2) Downscale to display size with smoothing
      const oc = document.createElement('canvas');
      oc.width = CAT_SIZE;
      oc.height = CAT_SIZE;
      const octx = oc.getContext('2d');
      octx.imageSmoothingEnabled = true;
      octx.imageSmoothingQuality = 'high';
      octx.drawImage(native, 0, 0, CAT_SIZE, CAT_SIZE);
      svgFrames[type].push(oc);
      if (++loaded === dataURIs.length) svgReady[type] = true;
    };
    img.src = uri;
  });
}

// Map each pet type to its sit animation frames
const sitType = { cat: 'cat_sit', greycat: 'greycat_sit' };

// ── Pet instances ─────────────────────────────────────────────
const pets = [];
let groundY;
let lastTime = 0;

function newPet(type) {
  return {
    type,
    x: Math.random() * Math.max(0, canvas.width - CAT_SIZE),
    facingRight: Math.random() > 0.5,
    frameIndex: 0,
    frameTimer: 0,
    sitting: false,
    waking: false,
    sitFrame: 0,
    sitDone: false,
    noPlaying: false,
    noFrame: 0,
    noCount: 0,
  };
}

function resetLayout() {
  groundY = canvas.height - 4;
  for (const p of pets) {
    p.x = Math.max(0, Math.min(canvas.width - CAT_SIZE, p.x));
  }
}
resetLayout();

// ── Drawing ──────────────────────────────────────────────────
function drawSprite(sprite, colors, x, y, flipped) {
  ctx.save();
  if (flipped) {
    ctx.translate(x + PET_W, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ci = sprite[r][c];
      if (!ci) continue;
      ctx.fillStyle = colors[ci];
      ctx.fillRect(c * PX, r * PX, PX, PX);
    }
  }
  ctx.restore();
}

// ── Update & Draw ────────────────────────────────────────────
function updatePet(p, dt) {
  // Cat No animation: alternate CATNO1 ↔ CATNO2, 5 times, then back to idle
  if (p.noPlaying) {
    p.frameTimer += dt;
    if (p.frameTimer >= 300) {
      p.frameTimer -= 300;
      p.noFrame = p.noFrame === 0 ? 1 : 0;
      p.noCount++;
      if (p.noCount >= 4) { // 2 full alternations (4 frame switches)
        p.noPlaying = false;
        p.noFrame = 0;
        p.noCount = 0;
        p.frameTimer = 0;
      }
    }
    return;
  }

  // Waking animation: reverse CATSIT4→3→2→1, then back to standing
  if (p.waking) {
    p.frameTimer += dt;
    if (p.frameTimer >= 400) {
      p.frameTimer -= 400;
      if (p.sitFrame > 0) {
        p.sitFrame--;
      } else {
        // Done waking — back to standing
        p.sitting = false;
        p.waking = false;
        p.sitDone = false;
        p.sitFrame = 0;
        p.frameTimer = 0;
      }
    }
    return;
  }

  // Phase 2 of sit: slow loop between frame 4 ↔ 5
  if (p.sitting && p.sitDone) {
    p.sitLoopTimer = (p.sitLoopTimer || 0) + dt;
    if (p.sitLoopTimer >= 800) {
      p.sitLoopTimer -= 800;
      p.sitFrame = p.sitFrame === 3 ? 4 : 3;
    }
    return;
  }

  p.frameTimer += dt;
  if (p.frameTimer >= 400) {
    p.frameTimer -= 400;

    // Sitting animation: play frames 1→2→3→4, then loop between 4 and 5
    if (p.sitting) {
      const st = sitType[p.type];
      if (st && svgReady[st]) {
        if (!p.sitDone) {
          if (p.sitFrame < 3) {
            p.sitFrame++;
          } else {
            p.sitDone = true;
            p.sitLoopTimer = 0;
          }
        }
      }
      return;
    }

    // Normal standing animation (random frame)
    if (svgReady[p.type]) {
      const len = svgFrames[p.type].length;
      p.frameIndex = Math.floor(Math.random() * len);
    }
  }
}

function update(dt) {
  for (const p of pets) updatePet(p, dt);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();

  for (const p of pets) {
    // Pick the right frame set and index
    let frameType, frameIdx;
    if (p.noPlaying) {
      frameType = 'cat_no';
      frameIdx = p.noFrame;
    } else if (p.sitting || p.waking) {
      frameType = sitType[p.type] || p.type;
      frameIdx = p.sitFrame;
    } else {
      frameType = p.type;
      frameIdx = p.frameIndex;
    }
    if (svgReady[frameType] && svgFrames[frameType].length > 0) {
      const frames = svgFrames[frameType];
      const oc = frames[frameIdx % frames.length];
      ctx.save();
      if (!p.facingRight) {
        ctx.translate(Math.round(p.x) + CAT_SIZE, groundY - CAT_SIZE);
        ctx.scale(-1, 1);
        ctx.drawImage(oc, 0, 0);
      } else {
        ctx.drawImage(oc, Math.round(p.x), groundY - CAT_SIZE);
      }
      ctx.restore();
    }
  }
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Toolbar icons ─────────────────────────────────────────────
function drawIcon(canvasId, type) {
  const ic = document.getElementById(canvasId);
  const ictx = ic.getContext('2d');
  const data = PETS[type];
  const sprite = data.idle[0];
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ci = sprite[r][c];
      if (!ci) continue;
      ictx.fillStyle = data.colors[ci];
      ictx.fillRect(c, r, 1, 1);
    }
  }
}
drawIcon('ic-cat', 'cat');
drawIcon('ic-cat_sit', 'cat_sit');
drawIcon('ic-cat_no', 'cat_no');
drawIcon('ic-greycat', 'greycat');
drawIcon('ic-greycat_sit', 'greycat_sit');

// ── Interaction ───────────────────────────────────────────────
document.getElementById('toolbar').addEventListener('click', (e) => {
  // Sit/Wake actions: toggle cats between sitting and standing
  const actionBtn = e.target.closest('button[data-action]');
  if (actionBtn) {
    const action = actionBtn.dataset.action;
    const targetType = action === 'sit' ? 'cat' : action === 'greysit' ? 'greycat' : null;
    if (targetType) {
      for (const p of pets) {
        if (p.type === targetType) {
          if (!p.sitting && !p.waking) {
            p.sitting = true;
            p.sitFrame = 0;
            p.sitDone = false;
            p.frameTimer = 0;
          } else if (p.sitting && !p.waking) {
            p.waking = true;
            p.sitFrame = Math.min(p.sitFrame, 3);
            p.frameTimer = 0;
          }
        }
      }
      return;
    }
    // Cat No action: make orange cats shake head
    if (action === 'catno') {
      for (const p of pets) {
        if (p.type === 'cat' && !p.noPlaying) {
          p.noPlaying = true;
          p.noFrame = 0;
          p.noCount = 0;
          p.frameTimer = 0;
        }
      }
      return;
    }
  }
  // Spawn new pet
  const btn = e.target.closest('button[data-type]');
  if (!btn) return;
  pets.push(newPet(btn.dataset.type));
});

// Drag pets to reposition, double-click to remove
let dragPet = null, dragOffsetX = 0, didDrag = false;

function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function hitTest(mx, my) {
  for (let i = pets.length - 1; i >= 0; i--) {
    const p = pets[i];
    const px = Math.round(p.x);
    const py = groundY - CAT_SIZE;
    if (mx >= px && mx <= px + CAT_SIZE && my >= py && my <= py + CAT_SIZE) return i;
  }
  return -1;
}

canvas.addEventListener('pointerdown', (e) => {
  const { x, y } = canvasCoords(e);
  const idx = hitTest(x, y);
  if (idx >= 0) {
    dragPet = pets[idx];
    dragOffsetX = x - Math.round(dragPet.x);
    didDrag = false;
    canvas.setPointerCapture(e.pointerId);
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!dragPet) return;
  didDrag = true;
  const { x } = canvasCoords(e);
  dragPet.x = Math.max(0, Math.min(canvas.width - CAT_SIZE, x - dragOffsetX));
});

canvas.addEventListener('pointerup', () => {
  if (dragPet && !didDrag) {
    dragPet.facingRight = !dragPet.facingRight;
  }
  dragPet = null;
});

canvas.addEventListener('dblclick', (e) => {
  const { x, y } = canvasCoords(e);
  const idx = hitTest(x, y);
  if (idx >= 0) pets.splice(idx, 1);
});

// ── Resize handle ─────────────────────────────────────────────
{
  const handle = document.getElementById('resize-handle');
  let dragging = false, startX, startY, startW, startH;
  handle.addEventListener('pointerdown', (e) => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startW = window.innerWidth;
    startH = window.innerHeight;
    handle.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const w = Math.max(180, startW + (e.clientX - startX));
    const h = Math.max(180, startH + (e.clientY - startY));
    parent.postMessage({ pluginMessage: { type: 'resize', width: Math.round(w), height: Math.round(h) } }, '*');
  });
  window.addEventListener('pointerup', () => { dragging = false; });
}

// ── Start ─────────────────────────────────────────────────────
pets.push(newPet('cat'));
requestAnimationFrame(loop);
</script>
