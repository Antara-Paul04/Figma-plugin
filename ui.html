<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--figma-color-bg, #2c2c2c);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #toolbar {
    display: flex;
    gap: 6px;
    padding: 6px 8px 2px;
    flex-shrink: 0;
  }
  #toolbar button {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: rgba(255,255,255,0.8);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    padding: 4px 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #toolbar button:hover {
    background: rgba(255,255,255,0.12);
  }
  #toolbar button:active {
    background: rgba(255,255,255,0.18);
  }
  #toolbar button canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #hint {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px;
    padding: 2px 0 4px;
    flex-shrink: 0;
  }
  #c {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    width: 100%;
    flex: 1;
    min-height: 0;
  }
</style>
</head>

// ── Constants ──────────────────────────────────────────────────
const PX = 3;
const SP_W = 16, SP_H = 14;
const PET_W = SP_W * PX;
const PET_H = SP_H * PX;

// ── Pet instances ─────────────────────────────────────────────
const pets = [];
let groundY;
let lastTime = 0;

function newPet(type) {
  return {
    type,
    x: Math.random() * Math.max(0, canvas.width - PET_W),
    facingRight: Math.random() > 0.5,
    state: 'IDLE',
    frameIndex: 0,
    stateTimer: 0,
    frameTimer: 0,
    idleDuration: 2000 + Math.random() * 3000,
    targetX: 0,
  };
}

function resetLayout() {
  groundY = canvas.height - 4;
  for (const p of pets) {
    p.x = Math.max(0, Math.min(canvas.width - PET_W, p.x));
  }
}
resetLayout();

// ── Drawing ──────────────────────────────────────────────────
function drawSprite(sprite, colors, x, y, flipped) {
  ctx.save();
  if (flipped) {
    ctx.translate(x + PET_W, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ci = sprite[r][c];
      if (!ci) continue;
      ctx.fillStyle = colors[ci];
      ctx.fillRect(c * PX, r * PX, PX, PX);
    }
  }
  ctx.restore();
}

function pickTarget() {
  return Math.random() * (canvas.width - PET_W);
}

// ── Update & Draw ────────────────────────────────────────────
function updatePet(p, dt) {
  p.stateTimer += dt;
  p.frameTimer += dt;

  const data = PETS[p.type];

  if (p.state === 'IDLE') {
    if (p.frameTimer >= 600) {
      p.frameTimer -= 600;
      p.frameIndex = (p.frameIndex + 1) % data.idle.length;
    }
    if (p.stateTimer >= p.idleDuration) {
      p.state = 'WALK';
      p.targetX = pickTarget();
      p.facingRight = p.targetX > p.x;
      p.frameIndex = 0;
      p.frameTimer = 0;
      p.stateTimer = 0;
    }
  } else {
    const speed = 0.8 * (dt / 16.67);
    if (p.frameTimer >= 150) {
      p.frameTimer -= 150;
      p.frameIndex = (p.frameIndex + 1) % data.walk.length;
    }
    const dist = p.targetX - p.x;
    if (Math.abs(dist) < speed + 0.5) {
      p.x = p.targetX;
      p.state = 'IDLE';
      p.idleDuration = 2000 + Math.random() * 3000;
      p.frameIndex = 0;
      p.frameTimer = 0;
      p.stateTimer = 0;
    } else {
      p.x += dist > 0 ? speed : -speed;
      p.facingRight = dist > 0;
    }
    p.x = Math.max(0, Math.min(canvas.width - PET_W, p.x));
  }
}

function update(dt) {
  for (const p of pets) updatePet(p, dt);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();

  for (const p of pets) {
    const data = PETS[p.type];
    const frames = p.state === 'IDLE' ? data.idle : data.walk;
    const sprite = frames[p.frameIndex % frames.length];
    drawSprite(sprite, data.colors, Math.round(p.x), groundY - PET_H, !p.facingRight);
  }
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Toolbar icons ─────────────────────────────────────────────
function drawIcon(canvasId, type) {
  const ic = document.getElementById(canvasId);
  const ictx = ic.getContext('2d');
  const data = PETS[type];
  const sprite = data.idle[0];
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ci = sprite[r][c];
      if (!ci) continue;
      ictx.fillStyle = data.colors[ci];
      ictx.fillRect(c, r, 1, 1);
    }
  }
}
drawIcon('ic-cat', 'cat');
drawIcon('ic-dog', 'dog');
drawIcon('ic-rabbit', 'rabbit');

// ── Interaction ───────────────────────────────────────────────
// Add pet via toolbar
document.getElementById('toolbar').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-type]');
  if (!btn) return;
  pets.push(newPet(btn.dataset.type));
});

// Remove pet via canvas click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Hit-test in reverse order (topmost first)
  for (let i = pets.length - 1; i >= 0; i--) {
    const p = pets[i];
    const px = Math.round(p.x);
    const py = groundY - PET_H;
    if (mx >= px && mx <= px + PET_W && my >= py && my <= py + PET_H) {
      pets.splice(i, 1);
      return;
    }
  }
});

// ── Start ─────────────────────────────────────────────────────
pets.push(newPet('cat'));
requestAnimationFrame(loop);
</script>
